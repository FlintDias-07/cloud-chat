<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudChat - Real-Time Chat Application</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .landing-container {
        text-align: center;
        color: white;
        max-width: 600px;
        animation: slideUp 0.8s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo {
        font-size: 80px;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      h1 {
        font-size: 48px;
        margin-bottom: 10px;
        font-weight: 700;
      }

      .tagline {
        font-size: 20px;
        opacity: 0.9;
        margin-bottom: 30px;
      }

      .features-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 40px 0;
        text-align: left;
      }

      .feature {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
      }

      .feature-icon {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .feature-title {
        font-weight: 600;
        margin-bottom: 5px;
      }

      .feature-desc {
        font-size: 13px;
        opacity: 0.8;
      }

      .button-group {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 40px;
      }

      .btn {
        padding: 14px 32px;
        border: 2px solid white;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: white;
        color: #667eea;
        border-color: white;
      }

      .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      .btn-secondary {
        background: transparent;
        color: white;
        border-color: white;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-3px);
      }

      @media (max-width: 600px) {
        .features-list {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 36px;
        }

        .button-group {
          flex-direction: column;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="landing-container">
      <div class="logo">☁️💬</div>
      <h1>CloudChat</h1>
      <p class="tagline">Real-Time Chat with Cloud Power</p>

      <div class="features-list">
        <div class="feature">
          <div class="feature-icon">⚡</div>
          <div class="feature-title">Lightning Fast</div>
          <div class="feature-desc">
            Real-time messaging powered by Socket.io
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔒</div>
          <div class="feature-title">Secure</div>
          <div class="feature-desc">
            JWT authentication & encrypted connections
          </div>
        </div>
        <div class="feature">
          <div class="feature-icon">☁️</div>
          <div class="feature-title">Cloud-Based</div>
          <div class="feature-desc">Scalable infrastructure on AWS</div>
        </div>
        <div class="feature">
          <div class="feature-icon">👥</div>
          <div class="feature-title">Multi-Room</div>
          <div class="feature-desc">
            Multiple chat rooms for different topics
          </div>
        </div>
      </div>

      <div class="button-group">
        <a href="login.html" class="btn btn-primary">Login</a>
        <a href="signup.html" class="btn btn-secondary">Sign Up</a>
      </div>
    </div>
  </body>
</html>
