<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudChat - User Profile</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 20px;
        text-align: center;
        position: relative;
      }

      .back-btn {
        position: absolute;
        left: 20px;
        top: 20px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        background: rgba(255, 255, 255, 0.3);
      }

      .avatar-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 20px;
      }

      .avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4px solid white;
        object-fit: cover;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }

      .avatar-upload {
        position: absolute;
        bottom: 0;
        right: 0;
        background: white;
        border-radius: 50%;
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
      }

      .avatar-upload:hover {
        transform: scale(1.1);
      }

      .avatar-upload input {
        display: none;
      }

      .username {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .user-meta {
        font-size: 14px;
        opacity: 0.9;
        margin-bottom: 15px;
      }

      .status-badge {
        display: inline-block;
        padding: 6px 15px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        border: 2px solid rgba(255, 255, 255, 0.5);
      }

      .status-badge.online {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
        border-color: #4caf50;
      }

      .status-badge.away {
        background: rgba(255, 193, 7, 0.2);
        color: #ffc107;
        border-color: #ffc107;
      }

      .status-badge.busy {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
        border-color: #f44336;
      }

      .content {
        padding: 30px 20px;
      }

      .section {
        margin-bottom: 25px;
      }

      .section-title {
        font-size: 14px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .bio-display {
        background: #f8f9ff;
        padding: 12px 15px;
        border-radius: 8px;
        color: #333;
        font-size: 15px;
        line-height: 1.5;
        min-height: 50px;
      }

      /* Edit Mode Styles */
      .edit-mode .bio-display {
        display: none;
      }

      .edit-form {
        display: none;
      }

      .edit-mode .edit-form {
        display: block;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        resize: vertical;
        min-height: 80px;
        transition: all 0.3s ease;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .status-select {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        cursor: pointer;
        background: white;
        transition: all 0.3s ease;
      }

      .status-select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .user-info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-top: 15px;
      }

      .info-item {
        background: #f8f9ff;
        padding: 12px 15px;
        border-radius: 8px;
      }

      .info-label {
        font-size: 12px;
        color: #999;
        margin-bottom: 5px;
      }

      .info-value {
        font-size: 14px;
        font-weight: 500;
        color: #333;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .button-group button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-edit {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-edit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-save {
        background: #4caf50;
        color: white;
      }

      .btn-save:hover {
        background: #45a049;
      }

      .btn-cancel {
        background: #f5f5f5;
        color: #333;
      }

      .btn-cancel:hover {
        background: #e0e0e0;
      }

      .btn-logout {
        background: #f44336;
        color: white;
        width: 100%;
      }

      .btn-logout:hover {
        background: #da190b;
      }

      .char-count {
        font-size: 12px;
        color: #999;
        margin-top: 5px;
      }

      .success-message {
        display: none;
        background: #efe;
        color: #3c3;
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 15px;
        border-left: 4px solid #3c3;
        font-size: 14px;
        animation: fadeOut 3s ease-in-out;
      }

      @keyframes fadeOut {
        0%,
        20% {
          opacity: 1;
        }
        80%,
        100% {
          opacity: 0;
        }
      }

      .loading {
        display: none;
        text-align: center;
        color: #667eea;
        padding: 20px;
      }

      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #e0e0e0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 600px) {
        .container {
          border-radius: 0;
        }

        .user-info-grid {
          grid-template-columns: 1fr;
        }

        .avatar {
          width: 100px;
          height: 100px;
        }

        .username {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <div class="avatar-container" id="avatarContainer">
          <img id="avatar" class="avatar" src="" alt="Profile Avatar" />
          <div class="avatar-upload" id="avatarUpload" style="display: none">
            <span style="font-size: 18px; cursor: pointer">📷</span>
            <input type="file" id="avatarFile" accept="image/*" />
          </div>
        </div>
        <h1 class="username" id="username">Loading...</h1>
        <div class="user-meta" id="userMeta">@username</div>
        <div class="status-badge online" id="statusBadge">Online</div>
      </div>

      <div class="content">
        <div class="success-message" id="successMessage">
          ✓ Profile updated successfully!
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Updating...</p>
        </div>

        <div class="section">
          <div class="section-title">Bio</div>
          <div class="bio-display" id="bioDisplay">Loading...</div>
          <div class="edit-form">
            <form>
              <textarea
                id="bioInput"
                placeholder="Tell us about yourself..."
              ></textarea>
              <div class="char-count">
                <span id="charCount">0</span>/150 characters
              </div>
            </form>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Status</div>
          <div class="edit-form" style="display: none">
            <select id="statusInput" class="status-select">
              <option value="online">🟢 Online</option>
              <option value="away">🟡 Away</option>
              <option value="busy">🔴 Busy</option>
              <option value="offline">⚫ Offline</option>
            </select>
          </div>
          <div class="bio-display" id="statusDisplay">online</div>
        </div>

        <div class="section">
          <div class="section-title">Account Information</div>
          <div class="user-info-grid">
            <div class="info-item">
              <div class="info-label">Email</div>
              <div class="info-value" id="email">—</div>
            </div>
            <div class="info-item">
              <div class="info-label">Member Since</div>
              <div class="info-value" id="memberSince">—</div>
            </div>
            <div class="info-item">
              <div class="info-label">User ID</div>
              <div class="info-value" id="userId" style="font-size: 12px">
                —
              </div>
            </div>
            <div class="info-item">
              <div class="info-label">Last Login</div>
              <div class="info-value" id="lastLogin">—</div>
            </div>
          </div>
        </div>

        <div class="button-group" id="buttonGroup">
          <button class="btn-edit" id="editBtn" onclick="toggleEditMode()">
            Edit Profile
          </button>
        </div>

        <div class="button-group" style="display: none" id="editButtonGroup">
          <button class="btn-save" onclick="saveProfile()">Save Changes</button>
          <button class="btn-cancel" onclick="toggleEditMode()">Cancel</button>
        </div>

        <button class="btn-logout" onclick="logout()" style="margin-top: 20px">
          Logout
        </button>
      </div>
    </div>

    <script src="assets/profile.js"></script>
  </body>
</html>
