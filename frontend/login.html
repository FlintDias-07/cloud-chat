<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudChat - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .container {
        display: flex;
        max-width: 1000px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .left-section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 60px 40px;
        flex: 1;
      }

      .logo {
        font-size: 48px;
        font-weight: bold;
        margin-bottom: 20px;
        animation: bounce 2s infinite;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .brand-text {
        font-size: 24px;
        font-weight: 300;
        text-align: center;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .features {
        list-style: none;
        opacity: 0.9;
      }

      .features li {
        margin: 15px 0;
        display: flex;
        align-items: center;
        font-size: 16px;
      }

      .features li:before {
        content: "✓";
        margin-right: 12px;
        font-size: 20px;
      }

      .right-section {
        flex: 1;
        padding: 60px 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .form-container h1 {
        font-size: 32px;
        color: #333;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .form-subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
        font-size: 14px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 20px 0;
        font-size: 14px;
      }

      .checkbox-wrapper {
        display: flex;
        align-items: center;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-right: 8px;
        cursor: pointer;
      }

      a {
        color: #667eea;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      a:hover {
        color: #764ba2;
      }

      .btn-login {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 20px;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
      }

      .btn-login:active {
        transform: translateY(0);
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 30px 0;
        color: #999;
        font-size: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }

      .divider span {
        padding: 0 15px;
      }

      .oauth-buttons {
        display: flex;
        gap: 12px;
      }

      .btn-oauth {
        flex: 1;
        padding: 10px;
        border: 2px solid #e0e0e0;
        background: white;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-oauth:hover {
        border-color: #667eea;
        color: #667eea;
        background: #f8f9ff;
      }

      .signup-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
        font-size: 14px;
      }

      .signup-link a {
        color: #667eea;
        font-weight: 600;
      }

      .error-message {
        display: none;
        background: #fee;
        color: #c33;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 4px solid #c33;
        font-size: 14px;
      }

      .success-message {
        display: none;
        background: #efe;
        color: #3c3;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 4px solid #3c3;
        font-size: 14px;
      }

      .loading {
        display: none;
        text-align: center;
        color: #667eea;
      }

      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #e0e0e0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
          margin: 20px;
        }

        .left-section {
          padding: 40px 20px;
        }

        .right-section {
          padding: 40px 20px;
        }

        .form-container h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-section">
        <div class="logo">☁️💬</div>
        <h2 class="brand-text">CloudChat</h2>
        <ul class="features">
          <li>Real-time messaging</li>
          <li>Secure & encrypted</li>
          <li>Cloud-based storage</li>
          <li>Multi-room support</li>
          <li>Online presence tracking</li>
        </ul>
      </div>

      <div class="right-section">
        <div class="form-container">
          <h1>Welcome Back!</h1>
          <p class="form-subtitle">Login to your CloudChat account</p>

          <div id="errorMessage" class="error-message"></div>
          <div id="successMessage" class="success-message"></div>

          <form id="loginForm">
            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                required
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
            </div>

            <div class="remember-forgot">
              <div class="checkbox-wrapper">
                <input type="checkbox" id="remember" name="remember" />
                <label for="remember" style="margin-bottom: 0"
                  >Remember me</label
                >
              </div>
              <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
            <div id="loading" class="loading">
              <div class="spinner"></div>
              <p style="margin-top: 10px">Logging in...</p>
            </div>
          </form>

          <div class="divider">
            <span>Or continue with</span>
          </div>

          <div class="oauth-buttons">
            <a href="http://127.0.0.1:3000/auth/google" class="btn-oauth">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10"></circle>
              </svg>
              Google
            </a>
          </div>

          <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign up now</a>
          </div>
        </div>
      </div>
    </div>

    <script src="assets/login.js"></script>
  </body>
</html>
